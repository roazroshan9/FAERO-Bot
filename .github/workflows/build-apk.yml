name: Build FAERO Android APK

on:
  push:
    branches: [main]
    paths:
      - 'faero-mobile/**'
      - '.github/workflows/build-apk.yml'

  pull_request:
    branches: [main]
    paths:
      - 'faero-mobile/**'

  workflow_dispatch:

jobs:
  build-apk:
    name: Cordova Android Debug APK
    runs-on: ubuntu-latest

    steps:

      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Node.js 18
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Android SDK
      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      # Install Cordova globally + dependencies
      - name: Install Cordova and project dependencies
        working-directory: faero-mobile
        run: |
          npm install
          npm install -g cordova

      # Verify Cordova
      - name: Verify Cordova
        run: cordova --version

      # Install backend deps
      - name: Install bot backend dependencies
        working-directory: faero-mobile/www/nodejs-project
        run: npm install --production

      # Clean Android platform
      - name: Clean Android platform
        working-directory: faero-mobile
        run: |
          cordova platform remove android --allow-root || true

      # Add Android platform
      - name: Add Android platform
        working-directory: faero-mobile
        run: |
          cordova platform add android@11.0.0 --save --allow-root

      # Add foreground plugin
      - name: Add FAERO foreground service plugin
        working-directory: faero-mobile
        run: |
          cordova plugin add ./faero-foreground-plugin --allow-root || true

      # Add nodejs-mobile plugin
      - name: Add nodejs-mobile-cordova plugin
        working-directory: faero-mobile
        run: |
          cordova plugin add nodejs-mobile-cordova@0.3.2 --allow-root

      # Prepare project
      - name: Prepare Cordova
        working-directory: faero-mobile
        run: |
          cordova prepare android --allow-root

      # Build APK
      - name: Build debug APK
        working-directory: faero-mobile
        run: |
          cordova build android --debug --allow-root

      # Upload APK
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: faero-debug-apk-${{ github.sha }}
          path: faero-mobile/platforms/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
